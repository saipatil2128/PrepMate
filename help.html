<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PrepMate Help Desk 💬</title>

  <style>
    body {
      font-family: "Comic Sans MS", cursive;
      background: linear-gradient(180deg, #e0f7ff, #fff2d8);
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .help-container {
      background: white;
      width: 90%;
      max-width: 600px;
      border-radius: 20px;
      box-shadow: 0 6px 15px rgba(0, 0, 0, 0.15);
      padding: 30px;
      margin: 40px 0;
    }

    h2 {
      text-align: center;
      color: #333;
    }

    p {
      text-align: center;
      color: #666;
      margin-top: 5px;
    }

    form {
      display: flex;
      flex-direction: column;
      margin-top: 20px;
    }

    label {
      font-weight: bold;
      margin-top: 10px;
      color: #444;
    }

    select, textarea, input {
      border-radius: 10px;
      border: 1px solid #ccc;
      padding: 10px;
      font-size: 15px;
      margin-top: 8px;
    }

    textarea {
      resize: none;
      height: 120px;
    }

    button {
      background: #6cb8ff;
      color: white;
      border: none;
      border-radius: 12px;
      padding: 12px 20px;
      margin-top: 20px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #4c9ee6;
    }

    .success {
      background: #d4edda;
      color: #155724;
      padding: 10px;
      border-radius: 10px;
      text-align: center;
      margin-top: 15px;
      display: none;
    }

    .error {
      background: #f8d7da;
      color: #721c24;
      padding: 10px;
      border-radius: 10px;
      text-align: center;
      margin-top: 15px;
      display: none;
    }

    .back-btn {
      background: #fbb03b;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 10px 20px;
      margin-top: 15px;
      cursor: pointer;
      transition: 0.3s;
    }

    .back-btn:hover {
      background: #e29b2d;
    }

    /* 🆘 Emergency Contact Section */
    .emergency-box {
      background: #f8fbff;
      border: 1px solid #dbe9ff;
      border-radius: 15px;
      padding: 20px;
      text-align: center;
      margin-top: 30px;
    }

    .emergency-box h3 {
      margin-bottom: 10px;
      color: #333;
    }

    .emergency-box p {
      color: #555;
      margin: 5px 0;
      font-size: 15px;
    }

    .emergency-box a {
      color: #007bff;
      text-decoration: none;
    }

    .emergency-box a:hover {
      text-decoration: underline;
    }

    .contact-icon {
      margin-right: 5px;
    }
  </style>
</head>
<body>
  <div class="help-container">
    <h2>🆘 Need Help?</h2>
    <p>Don’t worry — tell us what went wrong and we’ll fix it soon!</p>

    <form id="helpForm">
      <label for="category">Select Issue:</label>
      <select id="category" required>
        <option value="">-- Choose Issue Type --</option>
        <option value="ai">🤖 AI Not Responding</option>
        <option value="technical">⚙️ Technical Issue</option>
        <option value="learning">📚 Need Learning Help</option>
        <option value="account">👤 Account Issue</option>
        <option value="other">💭 Something Else</option>
      </select>

      <label for="description">Describe Your Problem:</label>
      <textarea id="description" placeholder="Type your issue here..." required></textarea>

      <button type="submit">📨 Submit Query</button>
    </form>

    <div class="success" id="successMsg">✅ Your query has been submitted! We’ll contact you soon.</div>
    <div class="error" id="errorMsg">⚠️ Failed to submit your query. Please try again later.</div>

    <button class="back-btn" onclick="window.location.href='dashboard.html'">⬅ Back to Dashboard</button>

    <!-- 🆘 Emergency Contact -->
    <div class="emergency-box">
      <h3>Emergency Contact</h3>
      <p>📧 <a href="mailto:help@prepmate.com">help@prepmate.com</a></p>
      <p>📞 <a href="tel:1800-PREPMATE">1-800-PREPMATE</a></p>
      <p><small>Available for any issues</small></p>
    </div>
  </div>

  <script type="module">
    import { auth, db } from "./scripts/firebase.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
    import { addDoc, collection } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

    const helpForm = document.getElementById("helpForm");
    const successMsg = document.getElementById("successMsg");
    const errorMsg = document.getElementById("errorMsg");

    let currentUser = null;

    onAuthStateChanged(auth, (user) => {
      if (user) currentUser = user;
    });

    helpForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      const category = document.getElementById("category").value;
      const description = document.getElementById("description").value.trim();

      if (!category || !description) {
        alert("Please fill in all fields!");
        return;
      }

      try {
        await addDoc(collection(db, "helpRequests"), {
          userId: currentUser ? currentUser.uid : "guest",
          email: currentUser ? currentUser.email : "anonymous",
          category,
          description,
          timestamp: new Date().toISOString()
        });

        successMsg.style.display = "block";
        errorMsg.style.display = "none";
        helpForm.reset();
      } catch (error) {
        console.error("❌ Error submitting help request:", error);
        errorMsg.style.display = "block";
        successMsg.style.display = "none";
      }
    });
  </script>
</body>
</html>
